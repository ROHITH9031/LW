<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Laundry Services - Hero Section</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="LW.png">
</head>
<body>
  <!-- Main hero container (fills the viewport) -->
  <div class="hero-container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-left">
        <div class="logo">
          <!-- You can replace this text with an actual logo image -->
          <span>FreshWash</span>
        </div>
        <ul class="nav-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#services">Services</a></li>
          <li><a href="#about">About Us</a></li>
          <li><a href="#contact">Contact Us</a></li>
        </ul>
      </div>

      <div class="nav-right">
        <!-- Replace this with your real name -->
        <span class="user-name">Atyam Rohith</span>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
      <!-- Left div -->
      <div class="hero-left">
        <h1>Premium Laundry Services at Your Doorstep</h1>
        <p>
          Save time and enjoy fresh, clean clothes with our professional laundry
          and dry-cleaning services. We pick up, clean, and deliver with care.
        </p>
        <button class="cta-btn">Book a Service Today</button>
      </div>

      <!-- Right div -->
      <div class="hero-right">
        <!-- You can change the image URL to any laundry-related image -->
        <img
          src="https://images.pexels.com/photos/5591675/pexels-photo-5591675.jpeg"
          alt="Laundry services"
        />
      </div>
    </section>
  </div>
</body>
</html>
